name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  packages: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Linting met flake8
        run: |
          flake8 app/ tests/ --max-line-length=100 --exclude=__pycache__

      - name: Unit tests met pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Docker image bouwen
        run: |
          docker build -t system-monitor:${{ github.sha }} .
          docker build -t system-monitor:latest .

      - name: AI log-analyse
        run: |
          python ai/anomaly_detection.py
        env:
          BUILD_DURATION: "999"
          TEST_FAILURES: "3"
          LOG_SIZE_BYTES: "2000000"
          FILES_CHANGED: "1"
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Login bij GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag system-monitor:latest ghcr.io/${{ github.repository_owner }}/system-monitor:latest
          docker tag system-monitor:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/system-monitor:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/system-monitor:latest
          docker push ghcr.io/${{ github.repository_owner }}/system-monitor:${{ github.sha }}

      - name: Deployment bevestigen
        run: |
          echo "Deployment succesvol!"
          echo "Build: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"